<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Carte du jour</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Quicksand:wght@500;600;700&display=swap');

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #FDEFF4 0%, #EDF2FB 50%, #ECF6EE 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .card {
    position: relative;
    overflow: hidden;
    border-radius: 30px;
    padding: 26px 22px 24px;
    max-width: 380px;
    width: 100%;
    background: linear-gradient(160deg, #FFEbDD, #FFC2A8);
    box-shadow: 0 18px 44px rgba(150, 140, 180, 0.28);
    transition: background 0.5s ease;
  }

  /* ---------- Illustration : zone héros ---------- */
  .hero {
    position: relative;
    height: 138px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 6px;
  }

  .halo {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 168px;
    height: 168px;
    transform: translate(-50%, -54%);
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,0.92) 0%, rgba(255,255,255,0.35) 45%, rgba(255,255,255,0) 72%);
    filter: blur(2px);
  }

  .icon {
    position: relative;
    font-size: 66px;
    line-height: 1;
    filter: drop-shadow(0 8px 14px rgba(120, 100, 140, 0.22));
  }

  .badge {
    position: relative;
    display: inline-block;
    font-family: 'Quicksand', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.4px;
    padding: 5px 15px;
    border-radius: 20px;
    box-shadow: 0 4px 10px rgba(120, 100, 140, 0.14);
  }

  /* ---------- En-tête (sur l'illustration) ---------- */
  .head {
    position: relative;
    text-align: center;
    margin-bottom: 14px;
  }

  .date {
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: 500;
    opacity: 0.85;
    margin-bottom: 2px;
  }

  .title {
    font-family: 'Quicksand', sans-serif;
    font-size: 23px;
    font-weight: 700;
    margin: 0;
  }

  /* ---------- Panneau givré (texte par-dessus) ---------- */
  .panel {
    position: relative;
    background: rgba(255, 255, 255, 0.66);
    -webkit-backdrop-filter: blur(12px);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.7);
    border-radius: 24px;
    padding: 22px 20px 20px;
    box-shadow: 0 8px 22px rgba(120, 110, 150, 0.12);
    text-align: center;
  }

  .exercise {
    font-size: 17px;
    color: #4A4A5C;
    font-weight: 500;
    margin-bottom: 16px;
    line-height: 1.5;
  }

  .motivation {
    font-family: 'Quicksand', sans-serif;
    font-size: 16px;
    font-weight: 600;
    font-style: italic;
    color: #5E5277;
    padding: 13px 14px;
    background: rgba(255, 255, 255, 0.6);
    border-radius: 16px;
    margin-bottom: 13px;
    line-height: 1.5;
  }

  .pensee-box {
    background: rgba(255, 255, 255, 0.58);
    border-radius: 16px;
    padding: 13px 14px;
    display: flex;
    gap: 10px;
    align-items: flex-start;
    text-align: left;
  }

  .pensee-icon { font-size: 18px; line-height: 1.4; }

  .pensee-label {
    font-size: 11px;
    color: #B58E9A;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 500;
    margin-bottom: 3px;
  }

  .pensee-text {
    font-size: 14px;
    color: #7C6A74;
    line-height: 1.6;
  }

  .actions {
    margin-top: 20px;
    display: flex;
    gap: 10px;
    justify-content: center;
  }

  button {
    font-family: 'Poppins', sans-serif;
    border: none;
    border-radius: 20px;
    padding: 11px 18px;
    font-size: 14px;
    cursor: pointer;
    transition: transform 0.1s ease, opacity 0.2s ease, background 0.2s ease;
  }

  button:active { transform: scale(0.96); }

  .nav-btn {
    background: rgba(255, 255, 255, 0.75);
    color: #9A92B5;
    width: 42px;
    font-size: 18px;
    box-shadow: 0 3px 8px rgba(120, 110, 150, 0.12);
  }

  .nav-btn:hover { background: #FFFFFF; }

  .done-btn {
    background: #D8EFE0;
    color: #4F8E6E;
    flex: 1;
    font-weight: 500;
    box-shadow: 0 3px 8px rgba(110, 160, 130, 0.18);
  }

  .done-btn.is-done {
    background: #A8DDC0;
    color: #34664C;
  }

  .outside-note {
    font-size: 12px;
    color: #9C8FB8;
    margin-top: 14px;
    line-height: 1.4;
  }

  .progress-wrap { margin-top: 16px; }

  .progress-label {
    font-size: 12px;
    color: #9A92B5;
    margin-bottom: 6px;
  }

  .progress-bar {
    width: 100%;
    height: 9px;
    background: rgba(255, 255, 255, 0.7);
    border-radius: 10px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #A8DDC0, #84CBA6);
    border-radius: 10px;
    transition: width 0.4s ease;
  }
</style>
</head>
<body>
  <div class="card" id="card">
    <div class="hero">
      <div class="halo"></div>
      <div class="icon" id="icon">🌷</div>
      <span class="badge" id="badge" style="display:none;"></span>
    </div>
    <div class="head">
      <div class="date" id="date-label">Astuce</div>
      <h1 class="title" id="title-label">Ouvre-moi dans Safari 🌷</h1>
    </div>
    <div class="panel">
      <div class="exercise" id="exercise">Pour afficher la carte du jour, ouvre ce fichier dans Safari (ou un autre navigateur) plutôt qu'en aperçu rapide.</div>
      <div class="motivation" id="motivation" style="display:none;"></div>
      <div class="pensee-box" id="pensee-box" style="display:none;">
        <span class="pensee-icon">💛</span>
        <div>
          <div class="pensee-label">Pensée du jour</div>
          <div class="pensee-text" id="pensee"></div>
        </div>
      </div>
      <div class="actions">
        <button class="nav-btn" id="prev-btn">‹</button>
        <button class="done-btn" id="done-btn">Marquer comme fait</button>
        <button class="nav-btn" id="next-btn">›</button>
      </div>
      <div class="outside-note" id="outside-note"></div>
      <div class="progress-wrap">
        <div class="progress-label" id="progress-label"></div>
        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
      </div>
    </div>
  </div>

<script>
const exercices = [
  {t:"10 min de marche rapide en musique", cat:"cardio", icon:"🚶"},
  {t:"15 squats + 15 fentes (en douceur)", cat:"force", icon:"💪"},
  {t:"20 min de vélo, vrai ou appartement", cat:"cardio", icon:"🚴"},
  {t:"5 min d'étirements doux au réveil", cat:"souplesse", icon:"🧘"},
  {t:"10 min de yoga, salutations au soleil", cat:"souplesse", icon:"🧘"},
  {t:"30 min de marche avec une amie", cat:"plaisir", icon:"👯"},
  {t:"Gainage : 3 fois 30 secondes", cat:"force", icon:"🔥"},
  {t:"15 min de natation ou aquagym", cat:"cardio", icon:"🏊"},
  {t:"Danse libre sur 3 musiques préférées", cat:"plaisir", icon:"💃"},
  {t:"20 min de course ou marche rapide", cat:"cardio", icon:"🏃"},
  {t:"5 min de mobilité épaules, hanches, chevilles", cat:"souplesse", icon:"🤸"},
  {t:"5 min de montée d'escaliers", cat:"force", icon:"🏗️"},
  {t:"15 min de pilates débutant (vidéo)", cat:"force", icon:"🤍"},
  {t:"30 min de balade en forêt ou au parc", cat:"plaisir", icon:"🌳"},
  {t:"10 min de renforcement abdos en douceur", cat:"force", icon:"💪"},
  {t:"30 min de vélo en famille", cat:"plaisir", icon:"🚲"},
  {t:"Étirements complets avant le coucher", cat:"souplesse", icon:"🌙"},
  {t:"Marche active pendant un appel téléphonique", cat:"cardio", icon:"📱"},
  {t:"10 min de corde à sauter ou jumping jacks", cat:"cardio", icon:"⏱️"},
  {t:"10 min de yoga pour le dos", cat:"souplesse", icon:"🧘"},
  {t:"1h de randonnée tranquille", cat:"plaisir", icon:"🥾"},
  {t:"15 min de circuit poids du corps", cat:"force", icon:"🔥"},
  {t:"Stretching des jambes après la douche", cat:"souplesse", icon:"🦵"},
  {t:"Aquagym ou natation détente", cat:"plaisir", icon:"🏊"},
  {t:"Marche rapide jusqu'au marché", cat:"cardio", icon:"🧺"},
  {t:"5 min d'étirements et respiration profonde", cat:"souplesse", icon:"🌬️"},
  {t:"10 min de renforcement fessiers", cat:"force", icon:"💪"},
  {t:"Vélo balade découverte", cat:"plaisir", icon:"🚲"},
  {t:"10 min de yoga doux et méditation", cat:"souplesse", icon:"🧘"},
  {t:"20 min de running débutant", cat:"cardio", icon:"🏃"},
  {t:"Journée détente : marche + étirements", cat:"plaisir", icon:"🌿"}
];

const motivations = [
  "Chaque petit pas compte, tu avances !",
  "Tu es plus forte que ta fatigue.",
  "Pas besoin d'être parfaite, juste régulière.",
  "Ton corps te dit merci d'avance.",
  "10 minutes valent toujours mieux que 0.",
  "Fais-le pour toi, juste pour toi.",
  "Bouger, c'est s'offrir un cadeau.",
  "Aujourd'hui, sois fière de toi.",
  "Le mouvement, c'est la liberté.",
  "Tu n'as rien à prouver, juste à essayer.",
  "Respire, bouge, recommence demain.",
  "Petit effort, grande victoire.",
  "Tu mérites ce moment pour toi.",
  "La motivation vient en bougeant, pas avant.",
  "Une version de toi te remerciera ce soir.",
  "Avance à ton rythme, sans pression.",
  "Le sport, c'est aussi du plaisir.",
  "Tu as déjà fait le plus dur : commencer.",
  "Sois douce avec toi-même, et régulière.",
  "Chaque séance est une preuve d'amour pour toi.",
  "Le corps adore le mouvement, offre-lui ça.",
  "Une pause active vaut mille excuses.",
  "Tu construis ta force, jour après jour.",
  "Le meilleur moment pour bouger, c'est maintenant.",
  "Tu es capable de bien plus que tu crois.",
  "Un jour à la fois, ça suffit.",
  "Ton énergie du jour commence par ce geste.",
  "Bouger un peu vaut mieux que culpabiliser beaucoup.",
  "Tu fais ça pour ton bien-être, point final.",
  "La régularité bat l'intensité.",
  "Aujourd'hui est un nouveau départ.",
  "Ton corps est ton allié, pas ton ennemi.",
  "Savoure le moment, pas la performance.",
  "Le sport, c'est du temps offert à toi.",
  "Tu progresses même quand tu ne le vois pas.",
  "Une petite victoire aujourd'hui, une grande confiance demain.",
  "Tu es sur la bonne voie, continue !"
];

const pensees = [
  "Un verre d'eau pétillante, un bon livre, et la soirée est déjà belle.",
  "Chaque jour sans alcool est un cadeau que tu te fais.",
  "Ton sommeil et ton énergie te disent merci.",
  "Tu n'es pas seule, et chaque jour compte.",
  "Remplace l'envie par un thé, une marche ou une grande respiration.",
  "Tu es en train de réécrire tes habitudes, et c'est énorme.",
  "La fierté que tu ressens vaut plus qu'un verre.",
  "Un jour à la fois, sans pression.",
  "Ton corps récupère, ta tête s'éclaircit un peu plus chaque jour.",
  "Célèbre chaque petite victoire, même invisible aux yeux des autres.",
  "Tu choisis ta version la plus forte, aujourd'hui encore.",
  "Pas de jugement, juste de la douceur envers toi-même.",
  "Chaque non que tu dis te rapproche de ce que tu veux.",
  "Ton énergie d'aujourd'hui vient de tes choix d'hier, continue.",
  "Tu es plus libre que tu ne le penses.",
  "Un petit pas, une grande différence sur la durée.",
  "Offre-toi un plaisir sans alcool : musique, bain chaud, balade.",
  "Tu avances, même les jours qui semblent plus difficiles.",
  "Sois fière du chemin déjà parcouru, il compte.",
  "Ton mieux d'aujourd'hui est suffisant, vraiment.",
  "Tu mérites de te sentir bien, pleinement et durablement.",
  "Chaque jour clair est un jour gagné pour toi.",
  "Tu construis une nouvelle routine, doucement et sûrement.",
  "Le sport t'aide aussi à apaiser l'envie, profite-en.",
  "Tu as le contrôle, pas l'inverse.",
  "Respire, ça passe, et tu seras fière après.",
  "Une habitude à la fois, tu y es presque.",
  "Ton futur toi te dit déjà merci pour aujourd'hui.",
  "Continue, tu fais quelque chose d'important pour toi."
];

const catInfo = {
  cardio:    { label: "Cardio",      bg: "#FFE0CE", fg: "#C97B5A" },
  force:     { label: "Force douce", bg: "#FBEEC0", fg: "#B89126" },
  souplesse: { label: "Souplesse",   bg: "#D8E9FA", fg: "#5588B5" },
  plaisir:   { label: "Plaisir",     bg: "#DCF0DF", fg: "#5E9C6E" }
};

// Palettes pastel par catégorie pour les illustrations de fond
const catVisual = {
  cardio:    { colors: ["#FFEEE0", "#FFD7C2", "#FFC0A4"], glow: "#FFB495", text: "#A85B3C" },
  force:     { colors: ["#FFF7DE", "#FBEBBC", "#F6DD9C"], glow: "#F1D079", text: "#9F7D22" },
  souplesse: { colors: ["#EAF2FC", "#D5E6F8", "#BFD8F3"], glow: "#A8CCEF", text: "#3F6F9C" },
  plaisir:   { colors: ["#EBF7ED", "#D6EFDA", "#C0E6C7"], glow: "#A7DCB2", text: "#3F7C53" }
};

function illustration(d) {
  const v = catVisual[d.ex.cat];
  const [c0, c1, c2] = v.colors;
  const g = v.glow;
  switch (d.i % 4) {
    case 0:
      return `radial-gradient(120% 95% at 15% 8%, ${g}cc, transparent 50%), radial-gradient(100% 80% at 92% 22%, ${c1}, transparent 60%), linear-gradient(158deg, ${c0}, ${c2})`;
    case 1:
      return `radial-gradient(95% 75% at 88% 10%, ${g}cc, transparent 55%), radial-gradient(115% 95% at 8% 82%, ${c1}, transparent 62%), linear-gradient(205deg, ${c0}, ${c2})`;
    case 2:
      return `radial-gradient(85% 80% at 50% -8%, ${g}bb, transparent 60%), radial-gradient(95% 90% at 22% 32%, ${c1}, transparent 58%), linear-gradient(135deg, ${c2}, ${c0})`;
    default:
      return `radial-gradient(100% 85% at 82% 82%, ${g}bb, transparent 56%), radial-gradient(95% 75% at 18% 14%, ${c1}, transparent 60%), linear-gradient(178deg, ${c0}, ${c2})`;
  }
}

const days = [];
for (let i = 0; i < 61; i++) {
  const ex = exercices[i % exercices.length];
  const mot = motivations[i % motivations.length];
  const pensee = pensees[i % pensees.length];
  let label, num, month;
  if (i < 30) { num = i + 1; month = 6; label = num + " juin"; }
  else { num = i - 29; month = 7; label = num + " juillet"; }
  days.push({ i, num, month, label, ex, mot, pensee });
}

function getTodayIndex() {
  const today = new Date();
  const m = today.getMonth() + 1;
  const d = today.getDate();
  if (m === 6 && d >= 1 && d <= 30) return d - 1;
  if (m === 7 && d >= 1 && d <= 31) return 29 + d;
  return null;
}

const todayIndex = getTodayIndex();
let current = todayIndex !== null ? todayIndex : 0;

const elCard = document.getElementById("card");
const elDate = document.getElementById("date-label");
const elTitle = document.getElementById("title-label");
const elBadge = document.getElementById("badge");
const elIcon = document.getElementById("icon");
const elExercise = document.getElementById("exercise");
const elMotivation = document.getElementById("motivation");
const elPensee = document.getElementById("pensee");
const elPenseeBox = document.getElementById("pensee-box");
const elDoneBtn = document.getElementById("done-btn");
const elOutsideNote = document.getElementById("outside-note");
const elProgressLabel = document.getElementById("progress-label");
const elProgressFill = document.getElementById("progress-fill");

function render(animate) {
  const d = days[current];
  const c = catInfo[d.ex.cat];
  const v = catVisual[d.ex.cat];

  elCard.style.background = illustration(d);

  elDate.textContent = (current === todayIndex) ? "Aujourd'hui" : d.label;
  elDate.style.color = v.text;
  elTitle.textContent = (current === todayIndex) ? "Carte du jour" : d.label;
  elTitle.style.color = v.text;

  elBadge.textContent = c.label;
  elBadge.style.background = c.bg;
  elBadge.style.color = c.fg;
  elBadge.style.display = "inline-block";

  elIcon.textContent = d.ex.icon;
  elExercise.textContent = d.ex.t;
  elMotivation.textContent = d.mot;
  elMotivation.style.display = "block";
  elPensee.textContent = d.pensee;
  elPenseeBox.style.display = "flex";

  const key = "carte-jour-fait-" + d.i;
  let isDone = false;
  try { isDone = localStorage.getItem(key) === "1"; } catch (e) {}
  elDoneBtn.textContent = isDone ? "Fait, bravo !" : "Marquer comme fait";
  elDoneBtn.classList.toggle("is-done", isDone);

  if (todayIndex === null) {
    elOutsideNote.textContent = "Hors période juin-juillet : voici une carte à découvrir.";
  } else {
    elOutsideNote.textContent = "";
  }

  let total = 0;
  try {
    for (let j = 0; j < days.length; j++) {
      if (localStorage.getItem("carte-jour-fait-" + j) === "1") total++;
    }
  } catch (e) {}
  const pct = Math.round((total / days.length) * 100);
  elProgressLabel.textContent = total + " / " + days.length + " jours réussis";
  elProgressFill.style.width = pct + "%";

  if (animate && elCard.animate) {
    [elIcon, elTitle, elExercise].forEach((el, k) => {
      el.animate(
        [{ opacity: 0, transform: "translateY(10px)" }, { opacity: 1, transform: "translateY(0)" }],
        { duration: 420, delay: k * 60, easing: "ease-out" }
      );
    });
  }
}

elDoneBtn.addEventListener("click", () => {
  const key = "carte-jour-fait-" + days[current].i;
  try {
    const isDone = localStorage.getItem(key) === "1";
    if (isDone) localStorage.removeItem(key);
    else localStorage.setItem(key, "1");
  } catch (e) {}
  render(false);
});

document.getElementById("prev-btn").addEventListener("click", () => {
  current = (current - 1 + days.length) % days.length;
  render(true);
});

document.getElementById("next-btn").addEventListener("click", () => {
  current = (current + 1) % days.length;
  render(true);
});

render(true);
</script>
</body>
</html>
